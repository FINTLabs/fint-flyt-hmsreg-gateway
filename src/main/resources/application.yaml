fint:
  application-id: fint-flyt-hmsreg-gateway

novari:
  flyt:
    web-instance-gateway:
      max-request-size: 500MB

logging:
  level:
    no.fintlabs.cache.ehcache.FintEhCacheEventLogger: WARN

server:
  error:
    include-message: always
  max-http-request-header-size: 40KB

spring:
  profiles:
    include:
      - flyt-kafka
      - flyt-logging
      - flyt-web-resource-server
      - flyt-file-client

  output:
    ansi:
      enabled: always
